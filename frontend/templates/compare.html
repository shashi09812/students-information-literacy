{% extends 'base.html' %}
{% block title %}Model Comparison{% endblock %}
{% block content %}

<h2 class="text-3xl font-extrabold text-indigo-800 mb-4">Assessment Breakdown</h2>
<p class="text-gray-600 mb-6">
  Review how different pedagogical analysis models evaluate the student's behavior.
  This provides a comprehensive view of the learning effect.
</p>
<div class="mb-8 font-semibold text-lg">
  Current Inputs: <span id="input-summary" class="text-indigo-700"></span>
</div>
<div id="comp-cards" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>

<script>
  // Read synced values
  const infoThinking = parseFloat(localStorage.getItem('infoThinking')) || 65;
  const infoRetrieval = parseFloat(localStorage.getItem('infoRetrieval')) || 60;
  const infoEthics = parseFloat(localStorage.getItem('infoEthics')) || 75;

  document.getElementById('input-summary').textContent =
    `Study Time: ${infoThinking}h, Quizzes: ${infoRetrieval}, Pre-test Score: ${infoEthics}%`;

  function classifyScore(score) {
    if (score >= 75)
      return { text: "High Effect", color: "text-green-800", bg: "bg-green-100" };
    if (score >= 50)
      return { text: "Moderate Effect", color: "text-orange-800", bg: "bg-orange-100" };
    return { text: "Low Effect", color: "text-red-700", bg: "bg-red-100" };
  }

  document.getElementById('comp-cards').innerHTML = '<div class="col-span-3 text-center text-gray-500 py-10">Running ML Models...</div>';

  fetch('/predict', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      info_thinking: infoThinking,
      info_retrieval: infoRetrieval,
      info_ethics: infoEthics
    })
  })
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        document.getElementById('comp-cards').innerHTML = `<div class="col-span-3 text-red-600">${data.error}</div>`;
        return;
      }
      const results = data.results;
      let cardsHtml = '';

      // Ordered models to display with user-friendly names
      const orderedModels = [
        { key: 'Decision Tree', label: 'Rule-Based Analysis', desc: 'Predicts based on threshold milestones.' },
        { key: 'KNN', label: 'Cohort Comparison', desc: 'Compares with similar student profiles.' },
        { key: 'Naive Bayes', label: 'Probability Assessment', desc: 'Statistical probability of success.' },
        { key: 'Random Forest', label: 'Comprehensive Evaluation', desc: 'A consolidated analysis of behavioral characteristics.' }
      ];

      orderedModels.forEach(m => {
        const resData = results[m.key];
        if (!resData) return;

        const classification = classifyScore(resData.score);
        // Ensure text is the exact predicted class
        classification.text = resData.classification;

        cardsHtml += `
        <div class="rounded-2xl p-6 border shadow ${classification.bg} ${m.key === 'Random Forest' ? 'ring-2 ring-indigo-500 transform scale-105' : ''}">
          <h3 class="text-lg font-bold mb-2 ${classification.color}">${m.label}</h3>
          <p class="mb-4 text-sm text-gray-700 h-10">${m.desc}</p>
          <div class="text-2xl font-black ${classification.color}">${resData.score.toFixed(1)}% <span class="text-sm font-normal">Confidence</span></div>
          <div class="mt-2 text-lg font-bold ${classification.color}">${classification.text}</div>
        </div>
      `;
      });

      document.getElementById('comp-cards').innerHTML = cardsHtml;
    })
    .catch(err => {
      document.getElementById('comp-cards').innerHTML = `<div class="col-span-3 text-red-600">Failed to load predictions.</div>`;
    });
</script>
{% endblock %}
