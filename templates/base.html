<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>{% block title %}Learning Predictor{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-4xl mx-auto mt-12 bg-white rounded-2xl shadow-lg p-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-900">Learning Predictor</h1>
            <p class="text-gray-600 text-lg mt-3">Analyzing Learning Behavior and Predicting Outcomes with Multiple Models</p>
            <p class="text-xs text-gray-500 mt-2">User ID: 18437812812498032667</p>
        </header>
        <nav class="flex justify-center mb-10">
            <a href="/" class="nav-link px-6 py-2 mx-2 rounded-lg bg-white text-indigo-700 font-semibold shadow-sm {% if request.path == '/' %}bg-indigo-100{% endif %}">Dashboard</a>
            <a href="/compare" class="nav-link px-6 py-2 mx-2 rounded-lg bg-white text-indigo-700 font-semibold shadow-sm {% if request.path == '/compare' %}bg-indigo-100{% endif %}">Model Comparison</a>
            <a href="/history" class="nav-link px-6 py-2 mx-2 rounded-lg bg-white text-indigo-700 font-semibold shadow-sm {% if request.path == '/history' %}bg-indigo-100{% endif %}">History & Analysis</a>
        </nav>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
